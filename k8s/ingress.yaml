apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marketpay-ingress
  namespace: stellar-marketpay
  labels:
    app.kubernetes.io/name: stellar-marketpay
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stellar-marketpay.example.com
      secretName: marketpay-tls
  rules:
    - host: stellar-marketpay.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: marketpay-backend
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: marketpay-backend
                port:
                  name: http
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: marketpay-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marketpay-frontend
                port:
                  name: http
